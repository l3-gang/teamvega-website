<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Team Vega</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <header class="page-header">
        <h1 class="page-title">Our Projects</h1>
        <p class="page-subtitle">Exploring our fleet of high-powered sounding rockets.</p>
    </header>

    <main>
        <section class="section">
            <div class="section-container">
                <div class="fleet-grid">
                    <div class="fleet-card">
                        <div class="fleet-img-container">
                            <img src="https://images.unsplash.com/photo-1517976487492-5750f3195933?auto=format&fit=crop&w=600&q=80" alt="Rocket 1">
                        </div>
                        <h3>Project Artemis</h3>
                        <p>Target Altitude: 10,000 ft</p>
                    </div>
                    <div class="fleet-card">
                        <div class="fleet-img-container">
                            <img src="https://images.unsplash.com/photo-1628126235206-5260b9ea6441?auto=format&fit=crop&w=600&q=80" alt="Rocket 2">
                        </div>
                        <h3>Project Zenith</h3>
                        <p>Target Altitude: 30,000 ft</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="components.js"></script>
</body>
</html>
