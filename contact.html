<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Team Vega</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <header class="page-header">
        <h1 class="page-title">Contact Us</h1>
        <p class="page-subtitle">Get in touch with Team Vega.</p>
    </header>

    <main>
        <section class="section">
            <div class="section-container" style="max-width: 600px; text-align: center;">
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Whether you are a student interested in joining, a potential sponsor, or just a space enthusiast, we'd love to hear from you!</p>
                <div style="background: var(--surface); padding: 3rem; border-radius: 12px; border: 1px solid var(--surface-border);">
                    <h3 style="margin-bottom: 1rem; color: var(--accent);">Email Us</h3>
                    <p><a href="mailto:hello@teamvega.example.com" style="color: var(--text-primary); font-size: 1.2rem; text-decoration: none; font-weight: 600;">hello@teamvega.example.com</a></p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="components.js"></script>
</body>
</html>
